services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookings
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_SSL: disable
    command:
      - ./booking
      - -dbhost=postgres
      - -dbport=5432
      - -dbname=bookings
      - -dbuser=${DB_USER}
      - -dbpass=${DB_PASS}
      - -dbssl=disable
      - -cache=true
      - -production=false
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: bookings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d bookings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
